entities:

  # =========================================================================
  # MODEL FAMILIES - Level 3 (13 total)
  # =========================================================================

  - type: ModelFamily
    name: "Static Models"
    properties:
      description: "Linear panel data models without lagged dependent variables"
      module_prefix: "panelbox.models.static"

  - type: ModelFamily
    name: "GMM"
    properties:
      description: "Generalized Method of Moments estimators for dynamic panels"
      module_prefix: "panelbox.gmm"

  - type: ModelFamily
    name: "Spatial Models"
    properties:
      description: "Spatial econometric models for data with geographic or network dependence"
      module_prefix: "panelbox.models.spatial"

  - type: ModelFamily
    name: "Discrete Choice"
    properties:
      description: "Models for binary, multinomial, and ordered categorical outcomes"
      module_prefix: "panelbox.models.discrete"

  - type: ModelFamily
    name: "Count Models"
    properties:
      description: "Models for count data (Poisson, Negative Binomial, Zero-Inflated)"
      module_prefix: "panelbox.models.count"

  - type: ModelFamily
    name: "Censored Models"
    properties:
      description: "Models for censored/truncated dependent variables (Tobit)"
      module_prefix: "panelbox.models.censored"

  - type: ModelFamily
    name: "Quantile Models"
    properties:
      description: "Quantile regression for heterogeneous effects across distribution"
      module_prefix: "panelbox.models.quantile"

  - type: ModelFamily
    name: "Selection Models"
    properties:
      description: "Models correcting for sample selection bias"
      module_prefix: "panelbox.models.selection"

  - type: ModelFamily
    name: "Instrumental Variables"
    properties:
      description: "Two-stage estimators for endogenous regressors"
      module_prefix: "panelbox.models.iv"

  - type: ModelFamily
    name: "Stochastic Frontier"
    properties:
      description: "Models for technical efficiency estimation"
      module_prefix: "panelbox.models.frontier"

  - type: ModelFamily
    name: "VAR"
    properties:
      description: "Vector Autoregressive models for panel data"
      module_prefix: "panelbox.models.var"

  - type: ModelFamily
    name: "Robust Regression"
    properties:
      description: "Estimators robust to outliers and heavy tails"
      module_prefix: "panelbox.models.robust"

  - type: ModelFamily
    name: "Mixed Effects"
    properties:
      description: "Hierarchical/multilevel models with random coefficients"
      module_prefix: "panelbox.models.mixed"

  # =========================================================================
  # STATISTICAL CONCEPTS - Level 2
  # =========================================================================

  - type: StatisticalConcept
    name: "Endogeneity"
    properties:
      description: "Correlation between regressors and error term"
      formal_definition: "E(u|X) != 0"
      implications: "OLS estimates are biased and inconsistent"

  - type: StatisticalConcept
    name: "Heteroskedasticity"
    properties:
      description: "Non-constant variance of errors"
      formal_definition: "Var(u_i|X_i) != sigma^2"
      implications: "OLS SEs are biased; use robust or clustered SEs"

  - type: StatisticalConcept
    name: "SerialCorrelation"
    properties:
      description: "Correlation between error terms across time"
      formal_definition: "Cov(u_it, u_is) != 0 for t != s"
      implications: "OLS SEs underestimate true variance; use HAC or clustered SEs"

  - type: StatisticalConcept
    name: "SpatialAutocorrelation"
    properties:
      description: "Dependence between observations in spatial proximity"
      formal_definition: "Cov(y_i, y_j) = f(d_ij) != 0"
      implications: "Standard models produce biased estimates; need spatial models"

  - type: StatisticalConcept
    name: "CrossSectionalDependence"
    properties:
      description: "Correlation between cross-sectional units"
      formal_definition: "Cov(u_it, u_jt) != 0 for i != j"
      implications: "Standard panel SEs are biased; use Driscoll-Kraay or PCSE"

  - type: StatisticalConcept
    name: "UnitRoot"
    properties:
      description: "Non-stationarity in panel time series"
      formal_definition: "rho = 1 in y_it = rho * y_i(t-1) + u_it"
      implications: "Spurious regression; need differencing or cointegration"

  - type: StatisticalConcept
    name: "Cointegration"
    properties:
      description: "Long-run equilibrium between non-stationary series"
      formal_definition: "I(1) series with I(0) linear combination"
      implications: "VECM appropriate; levels regression valid despite unit roots"

  - type: StatisticalConcept
    name: "Overidentification"
    properties:
      description: "More instruments than endogenous variables"
      formal_definition: "L > K where L = instruments, K = endogenous"
      implications: "Hansen/Sargan tests validate instrument exogeneity"

  - type: StatisticalConcept
    name: "Multicollinearity"
    properties:
      description: "High correlation between independent variables"
      formal_definition: "det(X'X) approx 0"
      implications: "Large SEs, unstable coefficients"

  - type: StatisticalConcept
    name: "OmittedVariableBias"
    properties:
      description: "Bias from excluding relevant variables"
      formal_definition: "E(b_OLS) = beta + (X'X)^-1 X'Z gamma"
      implications: "FE can control for time-invariant omitted variables"

  - type: StatisticalConcept
    name: "SelectionBias"
    properties:
      description: "Bias from non-random sample selection"
      formal_definition: "E(y|selected) != E(y)"
      implications: "Need Heckman correction or matching"

  - type: StatisticalConcept
    name: "Overdispersion"
    properties:
      description: "Variance exceeds mean in count data"
      formal_definition: "Var(y) > E(y)"
      implications: "Poisson model misspecified; use Negative Binomial"

  - type: StatisticalConcept
    name: "ExcessZeros"
    properties:
      description: "More zeros than expected by count distribution"
      implications: "Standard count models underfit; use Zero-Inflated models"

  - type: StatisticalConcept
    name: "TechnicalEfficiency"
    properties:
      description: "Distance from production frontier"
      formal_definition: "TE = exp(-u) where u >= 0"
      implications: "SFA decomposes error into noise and inefficiency"

  - type: StatisticalConcept
    name: "UnobservedHeterogeneity"
    properties:
      description: "Individual-specific effects not captured by observables"
      formal_definition: "y_it = X_it*beta + alpha_i + u_it"
      implications: "FE or RE needed; pooled OLS biased if correlated with X"

  - type: StatisticalConcept
    name: "DynamicPanelBias"
    properties:
      description: "Nickell bias from lagged dependent variable with FE"
      formal_definition: "Bias = O(1/T) in FE with y_(t-1)"
      implications: "GMM needed for dynamic panels with small T"

  - type: StatisticalConcept
    name: "Poolability"
    properties:
      description: "Whether data can be pooled across individuals"
      formal_definition: "H0: beta_i = beta for all i"
      implications: "If rejected, individual effects needed (FE/RE)"

  - type: StatisticalConcept
    name: "Censoring"
    properties:
      description: "Dependent variable bounded at threshold"
      formal_definition: "y* = max(0, X*beta + u)"
      implications: "OLS biased; Tobit or censored regression needed"

  - type: StatisticalConcept
    name: "QuantileEffects"
    properties:
      description: "Heterogeneous effects across the conditional distribution"
      implications: "Mean regression misses distributional effects; QR reveals"

  - type: StatisticalConcept
    name: "SampleSelectionBias"
    properties:
      description: "Non-random observability of dependent variable"
      formal_definition: "E(y|observed) != E(y)"
      implications: "Heckman two-step or MLE correction needed"

  - type: StatisticalConcept
    name: "InversMillsRatio"
    properties:
      description: "Correction term in Heckman selection model"
      formal_definition: "lambda(z) = phi(z)/Phi(z)"
      implications: "Significant lambda indicates selection bias"

  - type: StatisticalConcept
    name: "GrangerCausality"
    properties:
      description: "Predictive causality in time series context"
      formal_definition: "X Granger-causes Y if past X improves prediction of Y"
      implications: "Panel VAR enables testing with Wald tests"

  - type: StatisticalConcept
    name: "ImpulseResponseFunction"
    properties:
      description: "Dynamic response of variables to shocks"
      formal_definition: "IRF(h) = dY_(t+h)/dEpsilon_t"
      implications: "Panel VAR provides cross-unit averaged IRFs"

  - type: StatisticalConcept
    name: "InstrumentProliferation"
    properties:
      description: "Too many instruments relative to sample size in GMM"
      implications: "Weakens Hansen test; use collapse option or limit lags"

  - type: StatisticalConcept
    name: "VarianceDecomposition"
    properties:
      description: "Decomposition of total variance into within and between components"
      formal_definition: "Var(y) = Var_within + Var_between"

  # =========================================================================
  # ESTIMATORS - Level 1: Static Models
  # =========================================================================

  - type: Estimator
    name: "PooledOLS"
    properties:
      module_path: "panelbox.models.static.pooled_ols"
      class_name: "PooledOLS"
      description: "Pooled OLS ignoring panel structure"
      estimation_method: "OLS"
      supports_unbalanced: true

  - type: Estimator
    name: "FixedEffects"
    properties:
      module_path: "panelbox.models.static.fixed_effects"
      class_name: "FixedEffects"
      description: "Within estimator removing individual fixed effects"
      estimation_method: "OLS on demeaned data"
      assumptions: "Effects correlated with regressors; strict exogeneity"
      supports_unbalanced: true

  - type: Estimator
    name: "RandomEffects"
    properties:
      module_path: "panelbox.models.static.random_effects"
      class_name: "RandomEffects"
      description: "GLS estimator treating individual effects as random"
      estimation_method: "GLS"
      assumptions: "Effects uncorrelated with regressors"
      supports_unbalanced: true

  - type: Estimator
    name: "BetweenEstimator"
    properties:
      module_path: "panelbox.models.static.between"
      class_name: "BetweenEstimator"
      description: "OLS on individual means (between variation only)"
      estimation_method: "OLS"
      supports_unbalanced: true

  - type: Estimator
    name: "FirstDifferenceEstimator"
    properties:
      module_path: "panelbox.models.static.first_difference"
      class_name: "FirstDifferenceEstimator"
      description: "OLS on first-differenced data to remove fixed effects"
      estimation_method: "OLS"
      assumptions: "Strict exogeneity; errors may follow random walk"
      supports_unbalanced: true

  # =========================================================================
  # ESTIMATORS - Level 1: GMM
  # =========================================================================

  - type: Estimator
    name: "DifferenceGMM"
    properties:
      module_path: "panelbox.gmm.difference_gmm"
      class_name: "DifferenceGMM"
      description: "Arellano-Bond difference GMM for dynamic panels"
      estimation_method: "GMM"
      assumptions: "No second-order autocorrelation; valid instruments"
      min_T: 3
      supports_unbalanced: true

  - type: Estimator
    name: "SystemGMM"
    properties:
      module_path: "panelbox.gmm.system_gmm"
      class_name: "SystemGMM"
      description: "Blundell-Bond system GMM with level and difference equations"
      estimation_method: "GMM"
      assumptions: "No second-order autocorrelation; mean stationarity"
      min_T: 3
      supports_unbalanced: true

  - type: Estimator
    name: "BiasCorrectedGMM"
    properties:
      module_path: "panelbox.gmm.bias_corrected"
      class_name: "BiasCorrectedGMM"
      description: "Bias-corrected GMM for improved finite-sample performance"
      estimation_method: "GMM"

  - type: Estimator
    name: "ContinuousUpdatedGMM"
    properties:
      module_path: "panelbox.gmm.cue_gmm"
      class_name: "ContinuousUpdatedGMM"
      description: "Continuously Updated Estimator for efficient GMM"
      estimation_method: "GMM"

  # =========================================================================
  # ESTIMATORS - Level 1: Spatial
  # =========================================================================

  - type: Estimator
    name: "SpatialLag"
    properties:
      module_path: "panelbox.models.spatial.spatial_lag"
      class_name: "SpatialLag"
      description: "Spatial Autoregressive model (SAR) with spatially lagged dependent variable"
      estimation_method: "MLE"
      assumptions: "Known spatial weights matrix; no spatial error correlation"

  - type: Estimator
    name: "SpatialError"
    properties:
      module_path: "panelbox.models.spatial.spatial_error"
      class_name: "SpatialError"
      description: "Spatial Error Model (SEM) with spatially correlated errors"
      estimation_method: "MLE"
      assumptions: "Known spatial weights matrix; no substantive spatial interaction"

  - type: Estimator
    name: "SpatialDurbin"
    properties:
      module_path: "panelbox.models.spatial.spatial_durbin"
      class_name: "SpatialDurbin"
      description: "SDM nesting SAR with spatially lagged covariates"
      estimation_method: "MLE"

  - type: Estimator
    name: "DynamicSpatialPanel"
    properties:
      module_path: "panelbox.models.spatial.dynamic_spatial"
      class_name: "DynamicSpatialPanel"
      description: "Dynamic spatial panel with temporal and spatial lags"
      estimation_method: "QML"

  - type: Estimator
    name: "GeneralNestingSpatial"
    properties:
      module_path: "panelbox.models.spatial.gns"
      class_name: "GeneralNestingSpatial"
      description: "GNS model nesting SAR, SEM, and SDM"
      estimation_method: "MLE"

  # =========================================================================
  # ESTIMATORS - Level 1: Discrete Choice
  # =========================================================================

  - type: Estimator
    name: "PooledLogit"
    properties:
      module_path: "panelbox.models.discrete.pooled_logit"
      class_name: "PooledLogit"
      description: "Pooled logistic regression for binary outcomes"
      estimation_method: "MLE"

  - type: Estimator
    name: "PooledProbit"
    properties:
      module_path: "panelbox.models.discrete.pooled_probit"
      class_name: "PooledProbit"
      description: "Pooled probit regression for binary outcomes"
      estimation_method: "MLE"

  - type: Estimator
    name: "FixedEffectsLogit"
    properties:
      module_path: "panelbox.models.discrete.fe_logit"
      class_name: "FixedEffectsLogit"
      description: "Conditional logit with individual fixed effects"
      estimation_method: "Conditional MLE"
      assumptions: "Sufficient within-group variation in outcome"

  - type: Estimator
    name: "RandomEffectsProbit"
    properties:
      module_path: "panelbox.models.discrete.re_probit"
      class_name: "RandomEffectsProbit"
      description: "Random effects probit with normally distributed effects"
      estimation_method: "MLE (quadrature)"

  - type: Estimator
    name: "MultinomialLogit"
    properties:
      module_path: "panelbox.models.discrete.multinomial_logit"
      class_name: "MultinomialLogit"
      description: "Multinomial logit for unordered categorical outcomes"
      estimation_method: "MLE"

  - type: Estimator
    name: "ConditionalLogit"
    properties:
      module_path: "panelbox.models.discrete.conditional_logit"
      class_name: "ConditionalLogit"
      description: "Conditional logit for choice-specific attributes"
      estimation_method: "MLE"

  - type: Estimator
    name: "OrderedLogit"
    properties:
      module_path: "panelbox.models.discrete.ordered_logit"
      class_name: "OrderedLogit"
      description: "Ordered logit for ordinal outcomes"
      estimation_method: "MLE"

  - type: Estimator
    name: "OrderedProbit"
    properties:
      module_path: "panelbox.models.discrete.ordered_probit"
      class_name: "OrderedProbit"
      description: "Ordered probit for ordinal outcomes"
      estimation_method: "MLE"

  - type: Estimator
    name: "RandomEffectsOrderedLogit"
    properties:
      module_path: "panelbox.models.discrete.re_ordered_logit"
      class_name: "RandomEffectsOrderedLogit"
      description: "Random effects ordered logit"
      estimation_method: "MLE (quadrature)"

  - type: Estimator
    name: "DynamicBinaryPanel"
    properties:
      module_path: "panelbox.models.discrete.dynamic_binary"
      class_name: "DynamicBinaryPanel"
      description: "Dynamic binary panel with lagged dependent variable"
      estimation_method: "MLE"

  - type: Estimator
    name: "CorrelatedRandomEffectsLogit"
    properties:
      module_path: "panelbox.models.discrete.cre_logit"
      class_name: "CorrelatedRandomEffectsLogit"
      description: "CRE logit with Mundlak-Chamberlain device"
      estimation_method: "MLE"

  # =========================================================================
  # ESTIMATORS - Level 1: Count
  # =========================================================================

  - type: Estimator
    name: "PooledPoisson"
    properties:
      module_path: "panelbox.models.count.pooled_poisson"
      class_name: "PooledPoisson"
      description: "Pooled Poisson regression for count data"
      estimation_method: "MLE"

  - type: Estimator
    name: "PoissonFixedEffects"
    properties:
      module_path: "panelbox.models.count.poisson_fe"
      class_name: "PoissonFixedEffects"
      description: "Poisson with individual fixed effects"
      estimation_method: "Conditional MLE"

  - type: Estimator
    name: "RandomEffectsPoisson"
    properties:
      module_path: "panelbox.models.count.poisson_re"
      class_name: "RandomEffectsPoisson"
      description: "Random effects Poisson with gamma-distributed effects"
      estimation_method: "MLE"

  - type: Estimator
    name: "PoissonQML"
    properties:
      module_path: "panelbox.models.count.poisson_qml"
      class_name: "PoissonQML"
      description: "Quasi-MLE Poisson robust to distributional misspecification"
      estimation_method: "QML"

  - type: Estimator
    name: "NegativeBinomial"
    properties:
      module_path: "panelbox.models.count.negative_binomial"
      class_name: "NegativeBinomial"
      description: "Negative Binomial for overdispersed count data"
      estimation_method: "MLE"

  - type: Estimator
    name: "FixedEffectsNegativeBinomial"
    properties:
      module_path: "panelbox.models.count.negbin_fe"
      class_name: "FixedEffectsNegativeBinomial"
      description: "Conditional NegBin with fixed effects"
      estimation_method: "Conditional MLE"

  - type: Estimator
    name: "ZeroInflatedPoisson"
    properties:
      module_path: "panelbox.models.count.zip"
      class_name: "ZeroInflatedPoisson"
      description: "Zero-inflated Poisson for excess zeros"
      estimation_method: "MLE (EM)"

  - type: Estimator
    name: "ZeroInflatedNegativeBinomial"
    properties:
      module_path: "panelbox.models.count.zinb"
      class_name: "ZeroInflatedNegativeBinomial"
      description: "Zero-inflated NegBin for overdispersion and excess zeros"
      estimation_method: "MLE (EM)"

  - type: Estimator
    name: "PPML"
    properties:
      module_path: "panelbox.models.count.ppml"
      class_name: "PPML"
      description: "Pseudo Poisson Maximum Likelihood for gravity models"
      estimation_method: "PPML"

  # =========================================================================
  # ESTIMATORS - Level 1: Censored, Quantile, Selection, IV, Frontier, VAR
  # =========================================================================

  - type: Estimator
    name: "PooledTobit"
    properties:
      module_path: "panelbox.models.censored.pooled_tobit"
      class_name: "PooledTobit"
      description: "Pooled Tobit for censored dependent variable"
      estimation_method: "MLE"

  - type: Estimator
    name: "RandomEffectsTobit"
    properties:
      module_path: "panelbox.models.censored.re_tobit"
      class_name: "RandomEffectsTobit"
      description: "Random effects Tobit for panel censored data"
      estimation_method: "MLE (quadrature)"

  - type: Estimator
    name: "HonoreTrimmedEstimator"
    properties:
      module_path: "panelbox.models.censored.honore"
      class_name: "HonoreTrimmedEstimator"
      description: "Honore semiparametric FE estimator for censored panels"
      estimation_method: "Semiparametric"

  - type: Estimator
    name: "PooledQuantile"
    properties:
      module_path: "panelbox.models.quantile.pooled_quantile"
      class_name: "PooledQuantile"
      description: "Pooled quantile regression"
      estimation_method: "Linear programming"

  - type: Estimator
    name: "FixedEffectsQuantile"
    properties:
      module_path: "panelbox.models.quantile.fe_quantile"
      class_name: "FixedEffectsQuantile"
      description: "Koenker (2004) penalized FE quantile regression"
      estimation_method: "Penalized QR"

  - type: Estimator
    name: "CanayTwoStep"
    properties:
      module_path: "panelbox.models.quantile.canay"
      class_name: "CanayTwoStep"
      description: "Canay two-step debiased FE quantile regression"
      estimation_method: "Two-step QR"

  - type: Estimator
    name: "DynamicQuantile"
    properties:
      module_path: "panelbox.models.quantile.dynamic_quantile"
      class_name: "DynamicQuantile"
      description: "Dynamic quantile regression with lagged dependent variable"
      estimation_method: "IV-QR"

  - type: Estimator
    name: "LocationScale"
    properties:
      module_path: "panelbox.models.quantile.location_scale"
      class_name: "LocationScale"
      description: "Machado-Santos Silva location-scale quantile regression"
      estimation_method: "Two-step"

  - type: Estimator
    name: "QuantileTreatmentEffects"
    properties:
      module_path: "panelbox.models.quantile.qte"
      class_name: "QuantileTreatmentEffects"
      description: "Quantile treatment effects estimation"
      estimation_method: "QR"

  - type: Estimator
    name: "FEQuantileComparison"
    properties:
      module_path: "panelbox.models.quantile.comparison"
      class_name: "FEQuantileComparison"
      description: "Comparison framework for FE quantile methods"
      estimation_method: "Multiple"

  - type: Estimator
    name: "QuantileMonotonicity"
    properties:
      module_path: "panelbox.models.quantile.monotonicity"
      class_name: "QuantileMonotonicity"
      description: "Monotonicity rearrangement for quantile estimates"
      estimation_method: "Post-processing"

  - type: Estimator
    name: "PanelHeckman"
    properties:
      module_path: "panelbox.models.selection.panel_heckman"
      class_name: "PanelHeckman"
      description: "Panel Heckman two-step selection model"
      estimation_method: "Two-step (Probit + OLS)"

  - type: Estimator
    name: "PanelIV"
    properties:
      module_path: "panelbox.models.iv.panel_iv"
      class_name: "PanelIV"
      description: "Panel instrumental variables (2SLS) estimator"
      estimation_method: "2SLS"
      assumptions: "Valid instruments: relevant and exogenous"

  - type: Estimator
    name: "StochasticFrontier"
    properties:
      module_path: "panelbox.models.frontier.stochastic_frontier"
      class_name: "StochasticFrontier"
      description: "Stochastic frontier analysis for efficiency estimation"
      estimation_method: "MLE"

  - type: Estimator
    name: "FourComponentSFA"
    properties:
      module_path: "panelbox.models.frontier.four_component"
      class_name: "FourComponentSFA"
      description: "Kumbhakar et al. 4-component SFA: persistent + transient inefficiency"
      estimation_method: "MLE"

  - type: Estimator
    name: "PanelVAR"
    properties:
      module_path: "panelbox.models.var.panel_var"
      class_name: "PanelVAR"
      description: "Panel VAR with GMM estimation"
      estimation_method: "GMM"
      min_T: 4

  - type: Estimator
    name: "PanelVECM"
    properties:
      module_path: "panelbox.models.var.panel_vecm"
      class_name: "PanelVECM"
      description: "Panel Vector Error Correction Model for cointegrated series"
      estimation_method: "MLE"

  # =========================================================================
  # DIAGNOSTIC TESTS - Level 1
  # =========================================================================

  - type: DiagnosticTest
    name: "HausmanTest"
    properties:
      module_path: "panelbox.tests.hausman"
      function_name: "hausman_test"
      null_hypothesis: "Random effects are consistent (effects uncorrelated with regressors)"
      reject_means: "Use Fixed Effects"
      distribution: "Chi-squared"
      interpretation_guide: "p < 0.05: reject H0, use FE"

  - type: DiagnosticTest
    name: "ChowTest"
    properties:
      module_path: "panelbox.tests.chow"
      function_name: "chow_test"
      null_hypothesis: "All individual effects are zero (poolability)"
      reject_means: "Individual effects exist; use FE or RE"
      distribution: "F"

  - type: DiagnosticTest
    name: "BreuschPaganTest"
    properties:
      module_path: "panelbox.tests.breusch_pagan"
      function_name: "breusch_pagan_test"
      null_hypothesis: "Homoskedasticity"
      reject_means: "Heteroskedasticity present; use robust SEs"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "WhiteTest"
    properties:
      module_path: "panelbox.tests.white"
      function_name: "white_test"
      null_hypothesis: "Homoskedasticity"
      reject_means: "Heteroskedasticity present"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "ModifiedWaldTest"
    properties:
      module_path: "panelbox.tests.modified_wald"
      function_name: "modified_wald_test"
      null_hypothesis: "Homoskedasticity in FE model"
      reject_means: "Groupwise heteroskedasticity"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "WooldridgeARTest"
    properties:
      module_path: "panelbox.tests.wooldridge_ar"
      function_name: "wooldridge_ar_test"
      null_hypothesis: "No first-order serial correlation"
      reject_means: "Serial correlation present; use clustered or HAC SEs"
      distribution: "F"

  - type: DiagnosticTest
    name: "BreuschGodfreyTest"
    properties:
      module_path: "panelbox.tests.breusch_godfrey"
      function_name: "breusch_godfrey_test"
      null_hypothesis: "No serial correlation up to order p"
      reject_means: "Serial correlation present"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "BaltagiWuTest"
    properties:
      module_path: "panelbox.tests.baltagi_wu"
      function_name: "baltagi_wu_test"
      null_hypothesis: "No serial correlation in RE model"
      reject_means: "Serial correlation in random effects"
      distribution: "LBI statistic"

  - type: DiagnosticTest
    name: "PesaranCDTest"
    properties:
      module_path: "panelbox.tests.pesaran_cd"
      function_name: "pesaran_cd_test"
      null_hypothesis: "No cross-sectional dependence"
      reject_means: "CSD present; use Driscoll-Kraay or PCSE"
      distribution: "Normal (N(0,1))"

  - type: DiagnosticTest
    name: "BreuschPaganLMTest"
    properties:
      module_path: "panelbox.tests.bp_lm"
      function_name: "bp_lm_test"
      null_hypothesis: "No cross-sectional dependence"
      reject_means: "Cross-sectional dependence present"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "FreesTest"
    properties:
      module_path: "panelbox.tests.frees"
      function_name: "frees_test"
      null_hypothesis: "No cross-sectional dependence"
      reject_means: "Cross-sectional dependence present"
      distribution: "Q statistic"

  - type: DiagnosticTest
    name: "MundlakTest"
    properties:
      module_path: "panelbox.tests.mundlak"
      function_name: "mundlak_test"
      null_hypothesis: "RE consistent (no correlation between effects and regressors)"
      reject_means: "Use FE; Mundlak correction needed"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "RESETTest"
    properties:
      module_path: "panelbox.tests.reset"
      function_name: "reset_test"
      null_hypothesis: "Correct functional form"
      reject_means: "Possible misspecification; consider nonlinear terms"
      distribution: "F"

  - type: DiagnosticTest
    name: "HansenJTest"
    properties:
      module_path: "panelbox.tests.hansen_j"
      function_name: "hansen_j_test"
      null_hypothesis: "All instruments valid (overidentification)"
      reject_means: "Some instruments may be invalid"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "SarganTest"
    properties:
      module_path: "panelbox.tests.sargan"
      function_name: "sargan_test"
      null_hypothesis: "All instruments valid"
      reject_means: "Instruments not exogenous"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "ArellanoBondAR1Test"
    properties:
      module_path: "panelbox.tests.arellano_bond_ar"
      function_name: "ab_ar1_test"
      null_hypothesis: "No first-order autocorrelation in differences"
      reject_means: "AR(1) present (expected in difference GMM)"

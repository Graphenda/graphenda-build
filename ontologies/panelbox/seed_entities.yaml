    target: "RandomEffects"
    properties:
      comparison_note: "FE is consistent when effects correlated with regressors; RE is more efficient when uncorrelated"
  - source: "FixedEffects"
    relation: "ALTERNATIVE_TO"
    target: "FirstDifferenceEstimator"
    properties:
      comparison_note: "Both remove FE; FD better under random walk errors"
  - source: "SystemGMM"
    relation: "ALTERNATIVE_TO"
    target: "DifferenceGMM"
    properties:
      comparison_note: "System GMM more efficient but requires additional moment conditions"
  - source: "SpatialLag"
    relation: "ALTERNATIVE_TO"
    target: "SpatialError"
    properties:
      comparison_note: "SAR for substantive interaction; SEM for nuisance dependence"
  - source: "SpatialDurbin"
    relation: "ALTERNATIVE_TO"
    target: "SpatialLag"
    properties:
      comparison_note: "SDM nests SAR and tests for omitted spatially lagged covariates"
  - source: "PooledLogit"
    relation: "ALTERNATIVE_TO"
    target: "PooledProbit"
    properties:
      comparison_note: "Logit has logistic CDF; Probit has normal CDF. Usually similar results."
  - source: "FixedEffectsLogit"
    relation: "ALTERNATIVE_TO"

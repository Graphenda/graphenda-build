      null_hypothesis: "All panels contain unit roots"
      reject_means: "Some panels are stationary"
      distribution: "Normal"

  - type: DiagnosticTest
    name: "FisherTest"
    properties:
      module_path: "panelbox.tests.fisher"
      function_name: "fisher_test"
      null_hypothesis: "All panels contain unit roots"
      reject_means: "Some panels are stationary"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "BreitungTest"
    properties:
      module_path: "panelbox.tests.breitung"
      function_name: "breitung_test"
      null_hypothesis: "Panels contain unit roots"
      reject_means: "Panels are stationary"
      distribution: "Normal"

  - type: DiagnosticTest
    name: "HadriTest"
    properties:
      module_path: "panelbox.tests.hadri"
      function_name: "hadri_test"
      null_hypothesis: "All panels are stationary"
      reject_means: "Some panels have unit roots"

  # =========================================================================
  # CODE PATTERNS - Level 1
  # =========================================================================

  - type: CodePattern
    name: "ModelFitPattern"
    properties:
      description: "Standard pattern for fitting any PanelBox estimator"
      code: "model = Model(formula, data, entity_col, time_col); result = model.fit()"
      usage: "All estimators follow this pattern"

  - type: CodePattern
    name: "CovTypePattern"
    properties:
      description: "Standard error specification via cov_type parameter"
      code: "result = model.fit(cov_type='clustered')"
      usage: "All linear models accept cov_type parameter"

  - type: CodePattern
    name: "DiagnosticWorkflow"
    properties:
      description: "Recommended diagnostic test sequence for static models"
      code: "run pooled -> Chow test -> FE/RE -> Hausman -> heteroskedasticity -> serial correlation -> CSD"
      usage: "Recommended validation sequence for static models"

  - type: CodePattern
    name: "GMMInstrumentSpec"
    properties:
      description: "GMM instrument specification syntax"
      code: "gmm_instruments=['L.y'], iv_instruments=['x1', 'x2']"
      usage: "DifferenceGMM and SystemGMM instrument specification"

  - type: CodePattern
    name: "SpatialWeightsSpec"
    properties:
      description: "Spatial weights matrix specification"
      code: "W = spatial_weights_matrix(coords, type='queen')"
      usage: "All spatial models require a weights matrix"

  # =========================================================================
  # RESULT METRICS - Level 1
  # =========================================================================

  - type: ResultMetric
    name: "R_squared"
    properties:
      description: "Coefficient of determination"
      interpretation: "Proportion of variance explained; higher is better (0-1)"

  - type: ResultMetric
    name: "R_squared_within"
    properties:
      description: "Within R-squared for panel models"
      interpretation: "Variance explained by within-group variation"

  - type: ResultMetric
    name: "R_squared_between"
    properties:
      description: "Between R-squared for panel models"
      interpretation: "Variance explained by between-group variation"

  - type: ResultMetric
    name: "R_squared_overall"
    properties:
      description: "Overall R-squared for panel models"
      interpretation: "Total variance explained combining within and between"

  - type: ResultMetric
    name: "AIC"
    properties:
      description: "Akaike Information Criterion"
      interpretation: "Lower is better; penalizes model complexity"

  - type: ResultMetric
    name: "BIC"
    properties:
      description: "Bayesian Information Criterion"
      interpretation: "Lower is better; stronger penalty for complexity than AIC"

  - type: ResultMetric
    name: "LogLikelihood"
    properties:
      description: "Log-likelihood of the model"
      interpretation: "Higher (less negative) is better fit"

  - type: ResultMetric
    name: "F_statistic"
    properties:
      description: "F-test for overall significance"
      interpretation: "Large F with small p-value indicates significant model"

  - type: ResultMetric
    name: "Sigma_u"
    properties:
      description: "Standard deviation of individual effects"
      interpretation: "Captures between-group heterogeneity"

  - type: ResultMetric
    name: "Sigma_e"
    properties:
      description: "Standard deviation of idiosyncratic error"
      interpretation: "Captures within-group variation"

  - type: ResultMetric
    name: "Rho"
    properties:
      description: "Fraction of variance due to individual effects"
      interpretation: "rho = sigma_u^2 / (sigma_u^2 + sigma_e^2); high rho favors FE/RE"


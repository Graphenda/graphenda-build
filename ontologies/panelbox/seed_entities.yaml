  - type: DiagnosticTest
    name: "ArellanoBondAR2Test"
    properties:
      module_path: "panelbox.tests.arellano_bond_ar"
      function_name: "ab_ar2_test"
      null_hypothesis: "No second-order autocorrelation in differences"
      reject_means: "AR(2) present; GMM instruments invalid"
      distribution: "Normal"

  - type: DiagnosticTest
    name: "LMLagTest"
    properties:
      module_path: "panelbox.tests.spatial_lm"
      function_name: "lm_lag_test"
      null_hypothesis: "No spatial lag dependence"
      reject_means: "SAR model appropriate"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "LMErrorTest"
    properties:
      module_path: "panelbox.tests.spatial_lm"
      function_name: "lm_error_test"
      null_hypothesis: "No spatial error dependence"
      reject_means: "SEM model appropriate"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "RobustLMLagTest"
    properties:
      module_path: "panelbox.tests.spatial_lm"
      function_name: "robust_lm_lag_test"
      null_hypothesis: "No spatial lag (controlling for error)"
      reject_means: "SAR preferred over SEM"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "RobustLMErrorTest"
    properties:
      module_path: "panelbox.tests.spatial_lm"
      function_name: "robust_lm_error_test"
      null_hypothesis: "No spatial error (controlling for lag)"
      reject_means: "SEM preferred over SAR"
      distribution: "Chi-squared"

  - type: DiagnosticTest
    name: "MoranIPanelTest"
    properties:
      module_path: "panelbox.tests.moran_i"
      function_name: "moran_i_panel_test"
      null_hypothesis: "No spatial autocorrelation in residuals"
      reject_means: "Spatial model needed"
      distribution: "Normal"

  - type: DiagnosticTest
    name: "SpatialHausmanTest"
    properties:
      module_path: "panelbox.tests.spatial_hausman"

      icaap_required: true

  - type: RiskType
    name: "RiscoOperacional"
    properties:
      pillar: "pilar_1"
      definition_clause: "Res. CMN 4557 art. 32"
      icaap_required: true

  - type: RiskType
    name: "RiscoTaxaJuros_CarteiraBancaria"
    properties:
      pillar: "demais_riscos"
      definition_clause: "Res. CMN 4557 art. 27 / Circ. BCB 3876/2018"
      icaap_required: true

  - type: RiskType
    name: "RiscoLiquidez"
    properties:
      pillar: "demais_riscos"
      definition_clause: "Res. CMN 4557 art. 39"
      icaap_required: true

  - type: RiskType
    name: "RiscoContraparte"
    properties:
      pillar: "demais_riscos"
      definition_clause: "Res. CMN 4557 (CCR)"
      icaap_required: true

  - type: RiskType
    name: "RiscoConcentracao"
    properties:
      pillar: "demais_riscos"
      definition_clause: "Res. CMN 4557"
      icaap_required: true

  - type: RiskType
    name: "RiscoReputacao"
    properties:

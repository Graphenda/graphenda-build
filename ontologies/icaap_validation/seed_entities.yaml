# =============================================================================
# Seed entities - dados canonicos pre-populados que NAO devem ser extraidos
# do relatorio, mas servem como base de comparacao
# =============================================================================
entities:

  # =========================================================================
  # Level 3 - Frameworks Regulatorios
  # =========================================================================

  - type: RegulatoryFramework
    name: "BCB Prudential Framework"
    properties:
      description: "Arcabouco prudencial brasileiro emitido pelo CMN e pelo BCB, baseado em Basileia III/IV adaptado ao mercado local"
      jurisdiction: "BR"

  - type: RegulatoryFramework
    name: "Basel III/IV Framework"
    properties:
      description: "Padroes internacionais de capital, liquidez e gerenciamento de risco do BCBS"
      jurisdiction: "internacional"

  - type: RegulatoryFramework
    name: "Pilar 2 - Supervisory Review Process"
    properties:
      description: "Segundo pilar de Basileia: revisao supervisora; orienta ICAAP/SREP. BCBS SRP + Pilar 2 Overview (d465)"
      jurisdiction: "internacional"

  # =========================================================================
  # Level 3 - Categorias de Risco
  # =========================================================================

  - type: RiskCategory
    name: "Riscos de Pilar 1"
    properties:
      description: "Riscos com requerimento de capital regulatorio direto: credito, mercado, operacional"

  - type: RiskCategory
    name: "Demais Riscos Relevantes"
    properties:
      description: "Riscos materiais sem requerimento Pilar 1 direto: liquidez, contraparte, concentracao, reputacao, estrategia, contagio, fundos de pensao"

  - type: RiskCategory
    name: "Riscos ESG"
    properties:
      description: "Risco social, risco ambiental e risco climatico, conforme Res. CMN 4943/2021 e Res. BCB 306/2023"

  # =========================================================================
  # Level 3 - Areas do Processo ICAAP
  # =========================================================================

  - type: ICAAPProcessArea
    name: "Governanca do ICAAP"
    properties:
      description: "Atribuicoes do Conselho/Diretoria, mecanismos de governanca, fluxo de informacoes - Cap. II IN 686"

  - type: ICAAPProcessArea
    name: "Estrategia Corporativa"
    properties:
      description: "Estrategia, modelo de negocios, orcamento - Cap. III IN 686"

  - type: ICAAPProcessArea
    name: "Gestao e Mensuracao de Riscos"
    properties:
      description: "Governanca de risco, riscos relevantes, agregacao, testes de estresse, validacao - Cap. IV IN 686"

  - type: ICAAPProcessArea
    name: "Planejamento de Capital"
    properties:
      description: "Plano de capital, politica de dividendos, fontes de capital, contingencias - Cap. V IN 686"

  - type: ICAAPProcessArea
    name: "Auditoria Interna"
    properties:
      description: "Escopo e conclusoes da auditoria interna sobre gestao de riscos - Cap. VI IN 686"

  - type: ICAAPProcessArea
    name: "Planos de Acao"
    properties:
      description: "Autoavaliacao e medidas corretivas - Cap. VII IN 686"


  - source: "Statistical_Parity"
    relation: "MEASURES_BIAS"
    target: "Algorithmic_Bias"

  - source: "Equalized_Odds"
    relation: "MEASURES_BIAS"
    target: "Algorithmic_Bias"

  - source: "Calibration"
    relation: "MEASURES_BIAS"
    target: "Measurement_Bias"

  # MitigationStrategy -> BiasType
  - source: "Reweighing"

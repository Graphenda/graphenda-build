services:
  neo4j:
    image: neo4j:5.20-community
    container_name: graphenda-build-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-graphenda}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  build:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.build
    container_name: graphenda-build-job
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphenda}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GRAPHENDA_REGISTRY_PATH: /registry
      GRAPHENDA_ONTOLOGIES_PATH: /app/ontologies
    volumes:
      - ./ontologies:/app/ontologies:ro
      - ../graphenda-registry:/registry
      - ./logs:/app/logs
    profiles: ["job"]

volumes:
  neo4j_data:
  neo4j_logs:
